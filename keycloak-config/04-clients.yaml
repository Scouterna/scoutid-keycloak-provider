# LOCAL DEV/TEST SETUP ONLY
# Production configuration lives in scoutid-keycloak-infra and uses a dedicated realm.
# This file includes clients for local development (scout-test-client) and integration
# testing (scout-it-client). Neither should be deployed to production as-is.

realm: master

clients:
  # Account console needs access to all scopes to show custom attributes
  - clientId: account
    defaultClientScopes:
      - profile
      - email
      - phone
      - scoutnet-memberships

  # Keep the admin console on the built-in browser flow so admin login still works
  - clientId: security-admin-console
    authenticationFlowBindingOverrides:
      browser: browser
    attributes:
      login_theme: keycloak.v2

  - clientId: scout-test-client
    name: Scout Test Client
    description: "Local development client for testing ScoutID login"
    enabled: true
    publicClient: true
    standardFlowEnabled: true
    directAccessGrantsEnabled: false
    redirectUris:
      - "http://localhost:*"
      - "https://localhost:*"
    webOrigins:
      - "+"
    consentRequired: true
    defaultClientScopes:
      - profile
      - email
      - phone
      - scoutnet-memberships

  - clientId: scout-it-client
    name: Scout IT Client
    description: "Integration test client for verifying token claims — not for production use"
    enabled: true
    publicClient: true
    standardFlowEnabled: false
    directAccessGrantsEnabled: true
    authenticationFlowBindingOverrides:
      direct_grant: "ScoutID direct grant"
    defaultClientScopes:
      - profile
      - email
      - phone
      - scoutnet-memberships
